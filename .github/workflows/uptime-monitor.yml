name: Tradium Uptime Monitor

# Пингует прод каждые 10 минут. При недоступности:
#  1) шлёт Telegram-алерт (если заданы secrets BOT2_BOT_TOKEN + ADMIN_CHAT_ID)
#  2) фейлит job → GitHub шлёт письмо владельцу репо (работает без секретов)
# Самодостаточный: curl-only, без checkout и monitor.py (он удалён 2026-07,
# из-за чего старая версия воркфлоу тихо падала каждые 30 минут).
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping /api/health
        env:
          TG_TOKEN: ${{ secrets.BOT2_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.ADMIN_CHAT_ID }}
        run: |
          code=$(curl -s -o /dev/null -m 25 -w "%{http_code}" "https://tradium-signal-production.up.railway.app/api/health" || echo 000)
          echo "HTTP $code"
          case "$code" in
            200|401|403) echo "OK"; exit 0 ;;
          esac
          echo "SITE DOWN (HTTP $code)"
          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT" ]; then
            curl -s -m 15 "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d chat_id="${TG_CHAT}" \
              -d text="🔴 Tradium DOWN: /api/health вернул HTTP ${code} ($(date -u +%H:%M) UTC). Railway сам не поднимет — нужен redeploy." || true
          fi
          exit 1
