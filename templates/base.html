<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tradium Signal{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Tech Innovation palette */
            --electric: #0066ff;
            --electric-hover: #3385ff;
            --cyan: #00ffff;
            --dark: #0b0d12;
            --dark-1: #11141b;
            --dark-2: #171b24;
            --dark-3: #1f2430;
            --border: #252a38;
            --border-strong: #353a4a;
            --text: #ffffff;
            --text-2: #c6cad5;
            --muted: #6b7180;

            /* semantic */
            --buy: #00e5a0;
            --sell: #ff4d6d;
            --info: var(--cyan);
            --accent: var(--electric);

            --font-head: 'Inter', 'DejaVu Sans', sans-serif;
            --font-body: 'Inter', 'DejaVu Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;

            --radius: 14px;
            --radius-sm: 10px;
            --shadow: 0 10px 40px rgba(0, 102, 255, 0.08);
            --glow: 0 0 0 1px rgba(0,102,255,0.35), 0 0 24px rgba(0,102,255,0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { background: var(--dark); }
        body {
            background:
              radial-gradient(1200px 600px at 90% -10%, rgba(0,102,255,0.12), transparent 60%),
              radial-gradient(800px 400px at -10% 20%, rgba(0,255,255,0.06), transparent 60%),
              var(--dark);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 14px;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.005em;
        }

        h1,h2,h3,h4,h5 { font-family: var(--font-head); letter-spacing: -0.02em; }
        a { color: inherit; text-decoration: none; }

        /* ── Sidebar ── */
        .sidebar {
            width: 250px;
            min-height: 100vh;
            background: rgba(17,20,27,0.8);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0; bottom: 0;
            z-index: 10;
        }

        .sidebar-logo {
            padding: 30px 26px 28px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-logo h1 {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, var(--cyan) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sidebar-logo h1 span { color: var(--electric); -webkit-text-fill-color: var(--electric);}
        .sidebar-logo p {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--muted);
            margin-top: 6px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .sidebar-nav { padding: 22px 14px; flex: 1; }
        .nav-label {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--muted);
            padding: 8px 14px 12px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            color: var(--text-2);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            transition: all 0.15s ease;
            border: 1px solid transparent;
            position: relative;
        }
        .nav-item:hover { background: var(--dark-2); color: var(--text); }
        .nav-item.active {
            background: linear-gradient(135deg, rgba(0,102,255,0.18), rgba(0,255,255,0.08));
            color: var(--text);
            border-color: rgba(0,102,255,0.4);
            box-shadow: var(--glow);
        }
        .nav-item.active::before {
            content: '';
            position: absolute;
            left: -1px; top: 10px; bottom: 10px;
            width: 3px;
            background: var(--electric);
            border-radius: 0 3px 3px 0;
            box-shadow: 0 0 12px var(--electric);
        }
        .nav-item .icon { font-size: 15px; width: 18px; text-align: center; color: var(--electric); }

        /* ── Main ── */
        .main {
            margin-left: 250px;
            flex: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            background: rgba(17,20,27,0.6);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            padding: 22px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        .topbar h2 {
            font-size: 22px;
            font-weight: 700;
        }
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            background: rgba(0,255,255,0.06);
            border: 1px solid rgba(0,255,255,0.2);
            border-radius: 999px;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--cyan);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--cyan);
            box-shadow: 0 0 10px var(--cyan), 0 0 0 4px rgba(0,255,255,0.12);
            animation: pulse 2.4s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.45} }

        .logout-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px; height: 36px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--dark-2);
            color: var(--muted);
            font-size: 16px;
            text-decoration: none;
            transition: all 0.15s;
        }
        .logout-btn:hover {
            color: var(--sell);
            border-color: var(--sell);
        }

        /* ── Bot switcher ── */
        .bot-switcher {
            display: inline-flex;
            gap: 4px;
            padding: 4px;
            background: rgba(17,20,27,0.6);
            border: 1px solid var(--border);
            border-radius: 10px;
        }
        .bot-switch {
            padding: 7px 14px;
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            text-decoration: none;
            border-radius: 7px;
            transition: all 0.15s;
            border: 1px solid transparent;
        }
        .bot-switch:hover { color: var(--text-2); }
        .bot-switch.active {
            background: rgba(0,102,255,0.15);
            color: var(--cyan);
            border-color: rgba(0,255,255,0.35);
        }

        /* ── Sync button ── */
        .sync-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            height: 36px;
            padding: 0 14px;
            background: rgba(0,102,255,0.08);
            border: 1px solid rgba(0,102,255,0.35);
            border-radius: 8px;
            color: var(--cyan);
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.15s;
        }
        .sync-btn:hover:not(:disabled) {
            background: rgba(0,102,255,0.18);
            border-color: rgba(0,255,255,0.5);
            box-shadow: 0 0 18px rgba(0,102,255,0.25);
        }
        .sync-btn:disabled { opacity: 0.6; cursor: wait; }
        .sync-btn svg { flex-shrink: 0; }
        .sync-btn.spinning svg { animation: sync-spin 1s linear infinite; }
        @keyframes sync-spin { to { transform: rotate(360deg); } }

        /* ── Telegram auth button ── */
        .tg-auth-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 0 16px;
            height: 36px;
            border-radius: 8px;
            background: linear-gradient(135deg, rgba(0,136,204,0.12), rgba(41,182,246,0.06));
            border: 1px solid rgba(41,182,246,0.35);
            color: #7dc8f0;
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
        }
        .tg-auth-btn svg { flex-shrink: 0; }
        .tg-auth-btn:hover {
            background: linear-gradient(135deg, rgba(0,136,204,0.2), rgba(41,182,246,0.1));
            border-color: rgba(41,182,246,0.6);
            color: #a5dcff;
            box-shadow: 0 0 20px rgba(41,182,246,0.2);
        }
        .tg-auth-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #ff4d6d;
            box-shadow: 0 0 8px rgba(255,77,109,0.6);
            transition: all 0.2s;
        }
        .tg-auth-btn.authorized {
            background: linear-gradient(135deg, rgba(0,229,160,0.12), rgba(0,229,160,0.04));
            border-color: rgba(0,229,160,0.4);
            color: var(--buy);
        }
        .tg-auth-btn.authorized:hover {
            background: linear-gradient(135deg, rgba(0,229,160,0.2), rgba(0,229,160,0.08));
            box-shadow: 0 0 20px rgba(0,229,160,0.2);
        }
        .tg-auth-btn.authorized .tg-auth-dot {
            background: var(--buy);
            box-shadow: 0 0 8px rgba(0,229,160,0.6);
        }

        /* ── Telegram modal ── */
        .tg-modal { display:none; position:fixed; inset:0; z-index:200; align-items:center; justify-content:center; }
        .tg-modal.open { display:flex; }
        .tg-modal-backdrop { position:absolute; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(6px); }
        .tg-modal-content {
            position:relative;
            background: var(--dark-1);
            border: 1px solid var(--border-strong);
            border-radius: 14px;
            width: min(440px, 92vw);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(0,136,204,0.18);
        }
        .tg-modal-header {
            display:flex; justify-content:space-between; align-items:center;
            padding: 18px 22px; border-bottom: 1px solid var(--border);
        }
        .tg-modal-header h3 { font-size: 16px; font-weight: 700; }
        .tg-modal-close {
            background:none; border:none; color: var(--muted);
            font-size: 26px; cursor: pointer; line-height: 1;
        }
        .tg-modal-close:hover { color: var(--text); }
        .tg-modal-body { padding: 22px; }
        .tg-status-block {
            padding: 14px;
            border-radius: 8px;
            background: var(--dark-2);
            border: 1px solid var(--border);
            font-size: 13px;
            color: var(--text-2);
            margin-bottom: 16px;
            line-height: 1.55;
        }
        .tg-status-block.ok {
            background: rgba(0,229,160,0.08);
            border-color: rgba(0,229,160,0.35);
            color: var(--buy);
        }
        .tg-step label {
            display:block;
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .tg-step input {
            width: 100%;
            background: var(--dark-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 11px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-family: var(--font-head);
            outline: none;
            margin-bottom: 14px;
        }
        .tg-step input:focus {
            border-color: #5eb0e0;
            box-shadow: 0 0 0 3px rgba(0,136,204,0.18);
        }
        .tg-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #0088cc, #29b6f6);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: var(--font-head);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
        }
        .tg-btn:hover { filter: brightness(1.1); box-shadow: 0 0 20px rgba(0,136,204,0.4); }
        .tg-error {
            margin-top: 12px;
            padding: 10px 12px;
            background: rgba(255,77,109,0.1);
            border: 1px solid rgba(255,77,109,0.35);
            color: var(--sell);
            border-radius: 8px;
            font-size: 12px;
        }

        .content { padding: 36px 40px 60px; flex: 1; }

        /* ── Panels ── */
        .panel {
            background: linear-gradient(180deg, rgba(23,27,36,0.85), rgba(17,20,27,0.85));
            border: 1px solid var(--border);
            border-radius: var(--radius);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .panel:hover { border-color: var(--border-strong); }
        .panel-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .panel-header h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }

        /* ── Table ── */
        .table-wrap {
            background: linear-gradient(180deg, rgba(23,27,36,0.85), rgba(17,20,27,0.85));
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead { background: rgba(0,102,255,0.06); }
        th {
            padding: 14px 18px;
            text-align: left;
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 500;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
            color: var(--text-2);
        }
        tr:last-child td { border-bottom: none; }
        tbody tr { transition: background 0.12s; }
        tbody tr:hover td { background: rgba(0,102,255,0.05); color: var(--text); }

        /* ── Badges ── */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 999px;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .badge-buy { background: rgba(0,229,160,0.12); color: var(--buy); border: 1px solid rgba(0,229,160,0.3); }
        .badge-sell { background: rgba(255,77,109,0.12); color: var(--sell); border: 1px solid rgba(255,77,109,0.3); }
        .badge-yes { background: rgba(0,229,160,0.12); color: var(--buy); border: 1px solid rgba(0,229,160,0.3); }
        .badge-no { background: rgba(107,113,128,0.12); color: var(--muted); border: 1px solid var(--border); }
        .badge-ai { background: rgba(0,255,255,0.1); color: var(--cyan); border: 1px solid rgba(0,255,255,0.3); }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            font-family: var(--font-head);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.15s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--electric), var(--cyan));
            color: var(--dark);
            border: none;
        }
        .btn-primary:hover { filter: brightness(1.1); box-shadow: 0 0 24px rgba(0,102,255,0.4); }
        .btn-ghost { background: rgba(255,255,255,0.03); color: var(--text-2); border-color: var(--border-strong); }
        .btn-ghost:hover { background: rgba(0,102,255,0.08); color: var(--text); border-color: var(--electric); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }

        /* ── Filters ── */
        .filters { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
        .filters select, .filters input, .form-control {
            background: var(--dark-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-family: var(--font-head);
            font-weight: 500;
            outline: none;
            transition: all 0.15s;
            min-width: 140px;
        }
        .filters select:focus, .filters input:focus {
            border-color: var(--electric);
            box-shadow: 0 0 0 3px rgba(0,102,255,0.2);
        }
        .results-count {
            margin-left: auto;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--cyan);
            padding: 8px 14px;
            background: rgba(0,255,255,0.06);
            border: 1px solid rgba(0,255,255,0.2);
            border-radius: 999px;
            letter-spacing: 0.05em;
        }

        /* ── Pagination ── */
        .pagination { display: flex; gap: 6px; align-items: center; justify-content: center; margin-top: 28px; }
        .pagination a, .pagination span {
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-family: var(--font-mono);
            font-weight: 600;
            border: 1px solid var(--border);
            background: var(--dark-2);
            color: var(--text-2);
            transition: all 0.15s;
        }
        .pagination a:hover { background: rgba(0,102,255,0.1); color: var(--text); border-color: var(--electric); }
        .pagination .current {
            background: linear-gradient(135deg, var(--electric), var(--cyan));
            color: var(--dark);
            border-color: var(--electric);
        }

        /* ── Utility ── */
        .mono { font-family: var(--font-mono); }
        .text-muted { color: var(--muted); }
        .text-buy { color: var(--buy); font-weight: 600; }
        .text-sell { color: var(--sell); font-weight: 600; }
        .text-accent { color: var(--cyan); font-weight: 600; }
        .fw-700 { font-weight: 700; }

        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }
    </style>
</head>
<body>
<main class="main" style="margin-left:0;">
    <header class="topbar" style="padding:22px 40px;">
        <div style="display:flex;align-items:center;gap:24px;">
            <div>
                <h1 style="font-size:22px;font-weight:800;background:linear-gradient(135deg,#fff,var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent;">Tradium<span style="color:var(--electric);-webkit-text-fill-color:var(--electric);">.</span></h1>
                <p style="font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:0.2em;text-transform:uppercase;margin-top:2px;">Signal Monitor</p>
            </div>
            {% if bots %}
            <div class="bot-switcher">
              {% for b in bots %}
              <a href="/signals?bot={{ b.id }}" class="bot-switch {% if bot == b.id %}active{% endif %}">{{ b.label }}</a>
              {% endfor %}
            </div>
            {% endif %}
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
            {% if bot == 'tradium' %}
            <button id="syncBtn" class="sync-btn" title="Проверить пропущенные сигналы" onclick="runSync()">
                <svg id="syncIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 1-9 9c-2.52 0-4.93-.99-6.74-2.74L3 16"/><path d="M3 12a9 9 0 0 1 9-9c2.52 0 4.93.99 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M3 21v-5h5"/></svg>
                <span id="syncLabel">СИНХРО</span>
            </button>
            {% endif %}
            <div class="status-pill">
                <div class="dot"></div>
                Система активна
            </div>
            <a href="/logout" class="logout-btn" title="Выйти">⎋</a>
        </div>
    </header>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
</main>
<script>
async function runSync() {
  const btn = document.getElementById('syncBtn');
  const label = document.getElementById('syncLabel');
  if (!btn || btn.disabled) return;
  btn.disabled = true;
  btn.classList.add('spinning');
  label.textContent = 'СКАН…';
  try {
    const bot = (typeof CURRENT_BOT !== 'undefined') ? CURRENT_BOT : 'tradium';
    const r = await fetch(`/api/sync?limit=500&bot=${bot}`, { method: 'POST' });
    const d = await r.json();
    if (d.ok) {
      label.textContent = `+${d.added} / +${d.repaired_charts} гр.`;
      if (typeof updateLive === 'function') updateLive();
      setTimeout(() => { label.textContent = 'СИНХРО'; }, 5000);
    } else {
      label.textContent = 'ОШИБКА';
      console.error(d.error);
      setTimeout(() => { label.textContent = 'СИНХРО'; }, 4000);
    }
  } catch (e) {
    label.textContent = 'ОШИБКА';
    setTimeout(() => { label.textContent = 'СИНХРО'; }, 4000);
  } finally {
    btn.classList.remove('spinning');
    btn.disabled = false;
  }
}
</script>
</body>
</html>
