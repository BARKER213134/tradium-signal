<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Tradium Screener</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --electric: #0066ff;
            --cyan: #00ffff;
            --dark: #0b0d12;
            --dark-1: #11141b;
            --dark-2: #171b24;
            --border: #252a38;
            --border-strong: #353a4a;
            --text: #ffffff;
            --text-2: #c6cad5;
            --muted: #6b7180;
            --sell: #ff4d6d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            background: var(--dark);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        body {
            background:
              radial-gradient(1000px 500px at 80% -10%, rgba(0,102,255,0.15), transparent 60%),
              radial-gradient(700px 400px at 10% 100%, rgba(0,255,255,0.08), transparent 60%),
              var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background: linear-gradient(180deg, rgba(23,27,36,0.9), rgba(17,20,27,0.9));
            border: 1px solid var(--border-strong);
            border-radius: 18px;
            padding: 40px 36px 32px;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 60px rgba(0,102,255,0.12);
        }
        .logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, var(--cyan) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo h1 span {
            color: var(--electric);
            -webkit-text-fill-color: var(--electric);
        }
        .logo p {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-top: 6px;
        }
        .title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-2);
            text-align: center;
            margin-bottom: 24px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        .field { margin-bottom: 16px; }
        .field label {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .field input {
            width: 100%;
            background: var(--dark-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 13px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            outline: none;
            transition: all 0.15s;
        }
        .field input:focus {
            border-color: var(--electric);
            box-shadow: 0 0 0 3px rgba(0,102,255,0.2);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--electric), var(--cyan));
            color: var(--dark);
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.15s;
            margin-top: 8px;
        }
        .btn:hover {
            filter: brightness(1.1);
            box-shadow: 0 0 28px rgba(0,102,255,0.45);
        }
        .error {
            background: rgba(255,77,109,0.1);
            border: 1px solid rgba(255,77,109,0.35);
            color: var(--sell);
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 18px;
            text-align: center;
        }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 22px;
            padding: 6px 12px;
            background: rgba(0,255,255,0.06);
            border: 1px solid rgba(0,255,255,0.2);
            border-radius: 999px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--cyan);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .status .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--cyan);
            box-shadow: 0 0 6px var(--cyan);
            animation: pulse 2.4s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.45} }
        .footer {
            text-align: center;
            margin-top: 18px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <h1>Tradium<span>Screener</span></h1>
            <p>Signal Monitor</p>
        </div>
        <div class="title">Вход в систему</div>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="post" action="/login">
            <input type="hidden" name="next" value="{{ next }}">
            <div class="field">
                <label>Логин</label>
                <input type="text" name="username" autocomplete="username" required autofocus>
            </div>
            <div class="field">
                <label>Пароль</label>
                <input type="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn">Войти</button>
        </form>
        <div class="footer">
            <div class="status"><div class="dot"></div>Система активна</div>
        </div>
    </div>
</body>
</html>
