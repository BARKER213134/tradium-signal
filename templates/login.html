<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — 1 Milliard STA Screener</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --electric: #5b8cff;
            --cyan: #4cc9f0;
            --dark: #07080d;
            --dark-1: #0c0e15;
            --dark-2: #12141d;
            --border: rgba(148,163,184,0.09);
            --border-strong: rgba(148,163,184,0.18);
            --text: #f4f6fb;
            --text-2: #b9c0d0;
            --muted: #697084;
            --sell: #fb5d7d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            background: var(--dark);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        body {
            background:
              radial-gradient(1000px 500px at 80% -10%, rgba(91,140,255,0.13), transparent 60%),
              radial-gradient(800px 450px at 8% 105%, rgba(124,58,237,0.10), transparent 60%),
              radial-gradient(600px 350px at 50% 50%, rgba(76,201,240,0.04), transparent 65%),
              var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
              linear-gradient(rgba(148,163,184,0.028) 1px, transparent 1px),
              linear-gradient(90deg, rgba(148,163,184,0.028) 1px, transparent 1px);
            background-size: 44px 44px;
            mask-image: radial-gradient(ellipse 80% 65% at 50% 40%, #000 25%, transparent 75%);
            -webkit-mask-image: radial-gradient(ellipse 80% 65% at 50% 40%, #000 25%, transparent 75%);
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background: linear-gradient(180deg, rgba(20,24,34,0.85), rgba(12,14,21,0.90));
            border: 1px solid var(--border-strong);
            border-radius: 22px;
            padding: 40px 36px 32px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 24px 70px rgba(0,0,0,0.55), 0 0 70px rgba(91,140,255,0.10), inset 0 1px 0 rgba(255,255,255,0.05);
            position: relative;
            animation: cardIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(14px) scale(0.985); }
            to   { opacity: 1; transform: none; }
        }
        .logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, var(--cyan) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo h1 span {
            color: var(--electric);
            -webkit-text-fill-color: var(--electric);
        }
        .logo p {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-top: 6px;
        }
        .title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-2);
            text-align: center;
            margin-bottom: 24px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        .field { margin-bottom: 16px; }
        .field label {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .field input {
            width: 100%;
            background: var(--dark-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 13px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            outline: none;
            transition: all 0.15s;
        }
        .field input:focus {
            border-color: var(--electric);
            box-shadow: 0 0 0 3px rgba(91,140,255,0.18);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--electric), #7c5cff);
            color: #fff;
            border: none;
            border-radius: 11px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1);
            margin-top: 8px;
            box-shadow: 0 4px 18px rgba(91,140,255,0.30), inset 0 1px 0 rgba(255,255,255,0.18);
        }
        .btn:hover {
            filter: brightness(1.08);
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(91,140,255,0.45), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .btn:active { transform: translateY(0) scale(0.995); }
        .error {
            background: rgba(255,77,109,0.1);
            border: 1px solid rgba(255,77,109,0.35);
            color: var(--sell);
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 18px;
            text-align: center;
        }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 22px;
            padding: 6px 12px;
            background: rgba(0,255,255,0.06);
            border: 1px solid rgba(0,255,255,0.2);
            border-radius: 999px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--cyan);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .status .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--cyan);
            box-shadow: 0 0 6px var(--cyan);
            animation: pulse 2.4s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.45} }
        .footer {
            text-align: center;
            margin-top: 18px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo" style="display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:8px;">
            <div style="width:72px;height:72px;border-radius:14px;background:linear-gradient(135deg,#00e5a0 0%,#00d4ff 50%,#7b5cff 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(0,229,160,0.4),inset 0 0 30px rgba(255,255,255,0.1);position:relative;overflow:hidden;">
                <div style="font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:900;line-height:1;color:#0b0d12;">1B</div>
                <div style="font-family:'JetBrains Mono',monospace;font-size:10px;line-height:1;color:rgba(11,13,18,0.7);letter-spacing:0.2em;margin-top:3px;">STA</div>
                <div style="position:absolute;top:-14px;right:-14px;width:36px;height:36px;background:radial-gradient(circle,rgba(255,255,255,0.4) 0%,transparent 60%);"></div>
            </div>
            <h1 style="margin:0;font-size:22px;font-weight:800;background:linear-gradient(135deg,#fff 0%,#9db8ff 50%,#7b5cff 100%);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:-0.01em;">1 MILLIARD<span style="margin-left:6px;color:#5b8cff;-webkit-text-fill-color:#5b8cff;font-weight:900;">STA</span></h1>
            <p style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.3em;text-transform:uppercase;margin:0;">Screener</p>
        </div>
        <div class="title">Вход в систему</div>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="post" action="/login">
            <input type="hidden" name="next" value="{{ next }}">
            <div class="field">
                <label>Логин</label>
                <input type="text" name="username" autocomplete="username" required autofocus>
            </div>
            <div class="field">
                <label>Пароль</label>
                <input type="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn">Войти</button>
        </form>
        <div class="footer">
            <div class="status"><div class="dot"></div>Система активна</div>
        </div>
    </div>
</body>
</html>
